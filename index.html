<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Extreme Interactive Procedural Marble Race</title>
    <style>
        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; }
        body {
            margin: 0; padding: 0; background: #05070f; color: #f8fafc;
            font-family: system-ui, -apple-system, sans-serif; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            width: 100vw; height: 100vh; overflow: hidden;
        }
        #game-container { position: relative; display: flex; width: 100%; height: 100%; background: #05070f; }
        #canvas-container { flex: 1; display: flex; align-items: center; justify-content: center; height: 100%; padding: 10px; }
        canvas {
            background: #090d16; border: 3px solid #1e293b; border-radius: 16px;
            max-height: 100%; max-width: 100%; object-fit: contain;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
        }
        #sidebar {
            width: 340px; height: 100%; background: #0f172a; border-left: 2px solid #1e293b;
            display: flex; flex-direction: column; gap: 12px; padding: 15px; overflow-y: auto; z-index: 100;
        }
        #toggle-panel-btn {
            display: none; position: absolute; left: -50px; top: 15px; width: 40px; height: 40px;
            background: #38bdf8; border: none; border-radius: 6px; color: #0f172a;
            font-size: 16px; cursor: pointer; align-items: center; justify-content: center; z-index: 101;
        }
        .panel { background: #070a13; padding: 12px; border-radius: 8px; border: 1px solid #1e293b; }
        h2 { margin-top: 0; font-size: 11px; color: #38bdf8; text-align: center; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1.5px; }
        #editor-rows-container { max-height: 190px; overflow-y: auto; }
        .marble-edit-row {
            display: flex; flex-direction: column; gap: 4px; margin-bottom: 8px;
            background: #0f172a; padding: 6px; border-radius: 6px; border: 1px solid #1e293b;
        }
        .row-top { display: flex; gap: 5px; align-items: center; }
        .row-top input[type="text"] {
            background: #070a13; border: 1px solid #1e293b; color: white; padding: 5px; font-size: 12px; flex-grow: 1; border-radius: 4px;
        }
        .file-upload-label {
            background: #0284c7; color: white; padding: 4px 8px; font-size: 11px; border-radius: 4px; cursor: pointer; text-align: center;
        }
        .file-upload-label:hover { background: #0369a1; }
        .marble-color-input { width: 30px; height: 26px; border: none; cursor: pointer; background: none; }
        .delete-btn { background: #ef4444; padding: 5px 8px; font-size: 11px; border-radius: 4px; border: none; color: white; cursor: pointer; }
        #leaderboard { max-height: 150px; overflow-y: auto; }
        .leader-item { display: flex; justify-content: space-between; margin: 4px 0; padding: 8px; border-radius: 6px; border: 1px solid #1e293b; font-size: 12px; }
        button { padding: 10px; font-size: 13px; font-weight: bold; background: #0284c7; color: white; border: none; border-radius: 6px; cursor: pointer; }
        button:hover { background: #0369a1; }
        .secondary-btn { background: #0f172a; border: 1px solid #1e293b; width: 100%; }
        .map-btn { background: #0f172a; border: 1px solid #1e293b; margin-bottom: 5px; width: 100%; text-align: left; padding: 10px; color: #94a3b8; border-radius: 6px; }
        .map-btn.active { background: #0284c7; color: white; }
        #portrait-warning { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #070a13; z-index: 9999; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        @media (max-width: 900px) and (orientation: landscape) {
            #sidebar { position: absolute; right: 0; top: 0; background: rgba(15, 23, 42, 0.96); }
            #sidebar.hidden { transform: translateX(100%); }
            #toggle-panel-btn { display: flex; }
        }
        @media (orientation: portrait) { #portrait-warning { display: flex; } #game-container { display: none; } }
    </style>
</head>
<body>

<div id="portrait-warning">
    <h1>🔄 PAGRIEZIET IERĪCI</h1>
    <p>Novietojiet ierīci horizontāli (Landscape) režīmā.</p>
</div>

<div id="game-container">
    <div id="canvas-container">
        <canvas id="raceCanvas" width="480" height="650"></canvas>
    </div>
    
    <div id="sidebar" class="hidden">
        <div id="toggle-panel-btn" onclick="toggleSidebar()">⚙️</div>

        <div class="panel">
            <h2>TRASAS ĢENERĀCIJA</h2>
            <button class="map-btn active" id="map0-btn" onclick="changeMap(0)">⚙️ Rotējošie Propelleri</button>
            <button class="map-btn" id="map1-btn" onclick="changeMap(1)">🚪 Kustīgie Slīdošie Vārti</button>
            <button class="map-btn" id="map2-btn" onclick="changeMap(2)">🎰 Kinetiskais Plinko Labirints</button>
        </div>

        <div class="panel">
            <h2>DALĪBNIEKI</h2>
            <div id="editor-rows-container"></div>
            <button class="secondary-btn" onclick="addMarbleRow()">+ Pievienot bumbiņu</button>
        </div>

        <div class="panel">
            <h2>SACENSĪBU REZULTĀTI</h2>
            <div id="leaderboard"></div>
        </div>
        
        <button style="margin-top: auto; font-size: 15px; padding: 12px; background: #ef4444; box-shadow: 0 4px 10px rgba(239, 68, 68, 0.4);" onclick="startRaceBtn()">🏁 SĀKT JAUNU SACĪKSTI</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('raceCanvas');
    const ctx = canvas.getContext('2d');

    const baseGravity = 0.52; 
    const bounce = 0.6;   
    const trackHeight = 2500;
    let cameraY = 0;
    let currentMapIndex = 0;

    let marbles = [];
    let lines = [];
    let pins = [];
    let bumpers = [];
    let spinners = []; // Jaunums: rotējošie šķēršļi
    let movingSliders = []; // Jaunums: slīdošie vārti
    let finishedMarbles = [];
    let raceOver = false;

    let marblesList = [
        { name: 'SARKANS', color: '#ef4444', imgData: null },
        { name: 'ZILS', color: '#0ea5e9', imgData: null },
        { name: 'DZELTENS', color: '#eab308', imgData: null },
        { name: 'ZAĻAIS', color: '#22c55e', imgData: null }
    ];

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('hidden'); }

    function renderEditorUI() {
        const container = document.getElementById('editor-rows-container');
        container.innerHTML = '';
        marblesList.forEach((marble, i) => {
            container.innerHTML += `
                <div class="marble-edit-row">
                    <div class="row-top">
                        <input type="color" class="marble-color-input" id="m-color-${i}" value="${marble.color}" onchange="saveUIData(${i})">
                        <input type="text" id="m-name-${i}" value="${marble.name}" onchange="saveUIData(${i})">
                        <button class="delete-btn" onclick="deleteMarbleRow(${i})">X</button>
                    </div>
                    <div style="display:flex; justify-content: space-between; align-items: center; margin-top: 4px;">
                        <label class="file-upload-label" for="file-${i}">📁 Bilde</label>
                        <input type="file" id="file-${i}" accept="image/*" style="display:none;" onchange="handleFileSelect(event, ${i})">
                        <span style="font-size:10px; color:#64748b;" id="status-${i}">${marble.imgData ? '✓ Gatavs' : 'Nav bildes'}</span>
                    </div>
                </div>
            `;
        });
    }

    function handleFileSelect(event, i) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.src = e.target.result;
                img.onload = function() {
                    marblesList[i].imgData = img;
                    document.getElementById(`status-${i}`).innerText = '✓ Gatavs';
                }
            };
            reader.readAsDataURL(file);
        }
    }

    function saveUIData(i) {
        if (!document.getElementById(`m-name-${i}`)) return;
        marblesList[i].name = document.getElementById(`m-name-${i}`).value.toUpperCase();
        marblesList[i].color = document.getElementById(`m-color-${i}`).value;
    }

    function addMarbleRow() {
        marblesList.push({ name: `BUMBIŅA ${marblesList.length + 1}`, color: '#64748b', imgData: null });
        renderEditorUI();
    }

    function deleteMarbleRow(index) {
        if (marblesList.length <= 1) return;
        marblesList.splice(index, 1); renderEditorUI();
    }

    // Pilnībā pārstrādātas, daudz labākas un dinamiskākas trases
    function buildTrack() {
        lines = []; pins = []; bumpers = []; spinners = []; movingSliders = [];
        
        lines.push({x1: 0, y1: 110, x2: 200, y2: 170}, {x1: 480, y1: 110, x2: 280, y2: 170});
        lines.push({x1: 0, y1: 2380, x2: 200, y2: 2430}, {x1: 480, y1: 2380, x2: 280, y2: 2430});

        if (currentMapIndex === 0) {
            // ROTĒJOŠIE PROPELLERI
            for (let y = 260; y < 2200; y += 220) {
                let offset = (Math.random() - 0.5) * 40;
                lines.push({ x1: 0, y1: y, x2: 300 + offset, y2: y + 120 });
                lines.push({ x1: 480, y1: y + 110, x2: 180 - offset, y2: y + 230 });
                
                // Vidū starp rampām ieliekam rotējošus propellerus
                spinners.push({
                    x: 240 + (Math.random() - 0.5) * 60, y: y + 70, 
                    angle: Math.random() * Math.PI, speed: 0.03 + Math.random() * 0.03, length: 55
                });
            }
        } else if (currentMapIndex === 1) {
            // KUSTĪGIE SLĪDOŠIE VĀRTI
            for (let y = 280; y < 2200; y += 260) {
                lines.push({ x1: 0, y1: y, x2: 140, y2: y + 40 });
                lines.push({ x1: 480, y1: y, x2: 340, y2: y + 40 });
                
                bumpers.push({ x: 70, y: y + 130, r: 20 });
                bumpers.push({ x: 410, y: y + 130, r: 20 });

                // Vārti, kas slīd pa labi un pa kreisi
                movingSliders.push({
                    x: 240, y: y + 120, w: 120, h: 14, 
                    dir: Math.random() > 0.5 ? 1 : -1, speed: 1.8 + Math.random() * 1.5,
                    minX: 90, maxX: 390
                });
            }
        } else if (currentMapIndex === 2) {
            // KINETISKAIS PLINKO LABIRINTS
            for (let y = 240; y < 2250; y += 95) {
                let rowIdx = Math.floor(y / 95);
                let count = (rowIdx % 2 === 0) ? 6 : 5;
                let startX = (rowIdx % 2 === 0) ? 55 : 95;
                for (let i = 0; i < count; i++) {
                    let randX = (Math.random() - 0.5) * 14;
                    pins.push({ x: startX + i * 74 + randX, y: y, r: 5.5 });
                }
                // Ik pēc pāris rindām ieliekam mazu ātrgaitas spineri
                if (rowIdx % 3 === 0) {
                    spinners.push({
                        x: 100 + Math.random() * 280, y: y + 45, 
                        angle: Math.random() * Math.PI, speed: 0.05, length: 35
                    });
                }
            }
        }
    }

    function changeMap(index) {
        currentMapIndex = index;
        document.querySelectorAll('.map-btn').forEach((b, i) => b.classList.toggle('active', i === index));
        startRace();
    }

    function startRaceBtn() {
        if (window.innerWidth <= 900) document.getElementById('sidebar').classList.add('hidden');
        startRace();
    }

    function startRace() {
        raceOver = false; cameraY = 0; finishedMarbles = [];
        buildTrack(); marbles = [];

        marblesList.forEach((data, i) => {
            let startX = 140 + (i * (200 / (marblesList.length - 1 || 1))) + (Math.random() - 0.5) * 25;
            marbles.push({
                x: startX, y: 30 - (i * 26), vx: (Math.random() - 0.5) * 5, vy: 3, r: 11,
                color: data.color, name: data.name, img: data.imgData, done: false, stuckTimer: 0,
                speedMultiplier: 1.0 
            });
        });
    }

    function getClosestPoint(px, py, x1, y1, x2, y2) {
        let dx = x2 - x1; let dy = y2 - y1;
        let t = ((px - x1) * dx + (py - y1) * dy) / (dx * dx + dy * dy);
        t = Math.max(0, Math.min(1, t));
        return { x: x1 + t * dx, y: y1 + t * dy };
    }

    function update() {
        let leadingY = 0;

        // Kustīgo vārtu loģika
        movingSliders.forEach(s => {
            s.x += s.dir * s.speed;
            if (s.x - s.w/2 < s.minX) { s.x = s.minX + s.w/2; s.dir = 1; }
            if (s.x + s.w/2 > s.maxX) { s.x = s.maxX - s.w/2; s.dir = -1; }
        });

        // Propelleru griešanās loģika
        spinners.forEach(sp => {
            sp.angle += sp.speed;
        });

        marbles.forEach(m => {
            if (m.done) return;

            m.speedMultiplier += 0.0024; 
            let dynamicGravity = baseGravity * m.speedMultiplier;

            m.vy += dynamicGravity; 
            m.x += m.vx; m.y += m.vy;

            // Sienas
            if (m.x - m.r < 10) { m.x = m.r + 10; m.vx = Math.abs(m.vx) * bounce * m.speedMultiplier + Math.random(); }
            if (m.x + m.r > canvas.width - 10) { m.x = canvas.width - m.r - 10; m.vx = -Math.abs(m.vx) * bounce * m.speedMultiplier - Math.random(); }

            // Rampas/Līnijas
            lines.forEach(line => {
                let closest = getClosestPoint(m.x, m.y, line.x1, line.y1, line.x2, line.y2);
                let dx = m.x - closest.x; let dy = m.y - closest.y;
                let dist = Math.sqrt(dx*dx + dy*dy);

                if (dist < m.r) {
                    let nx = dx / (dist || 1); let ny = dy / (dist || 1);
                    m.x = closest.x + nx * (m.r + 0.1); m.y = closest.y + ny * (m.r + 0.1);
                    let dot = m.vx * nx + m.vy * ny;
                    m.vx = (m.vx - 2 * dot * nx) * 0.25; m.vy = (m.vy - 2 * dot * ny) * 0.25;

                    let lx = line.x2 - line.x1; let ly = line.y2 - line.y1;
                    let lLen = Math.sqrt(lx*lx + ly*ly);
                    if (lLen > 0) {
                        m.vx += (lx / lLen) * 1.35 * m.speedMultiplier + (Math.random() - 0.5);
                        m.vy += (ly / lLen) * 1.35 * m.speedMultiplier;
                    }
                }
            });

            // Slīdošo vārtu sadursmes fizika
            movingSliders.forEach(s => {
                let sLeft = s.x - s.w/2; let sRight = s.x + s.w/2;
                let sTop = s.y - s.h/2; let sBottom = s.y + s.h/2;

                let closestX = Math.max(sLeft, Math.min(m.x, sRight));
                let closestY = Math.max(sTop, Math.min(m.y, sBottom));

                let dx = m.x - closestX; let dy = m.y - closestY;
                let dist = Math.sqrt(dx*dx + dy*dy);

                if (dist < m.r) {
                    let nx = dx / (dist || 1); let ny = dy / (dist || 1);
                    m.x = closestX + nx * (m.r + 0.1); m.y = closestY + ny * (m.r + 0.1);
                    
                    let dot = m.vx * nx + m.vy * ny;
                    m.vx = (m.vx - 2 * dot * nx) * bounce + s.dir * s.speed * 0.5;
                    m.vy = (m.vy - 2 * dot * ny) * bounce;
                }
            });

            // Rotējošo propelleru līniju sadursmes fizika
            spinners.forEach(sp => {
                let x1 = sp.x - Math.cos(sp.angle) * sp.length;
                let y1 = sp.y - Math.sin(sp.angle) * sp.length;
                let x2 = sp.x + Math.cos(sp.angle) * sp.length;
                let y2 = sp.y + Math.sin(sp.angle) * sp.length;

                let closest = getClosestPoint(m.x, m.y, x1, y1, x2, y2);
                let dx = m.x - closest.x; let dy = m.y - closest.y;
                let dist = Math.sqrt(dx*dx + dy*dy);

                if (dist < m.r) {
                    let nx = dx / (dist || 1); let ny = dy / (dist || 1);
                    m.x = closest.x + nx * (m.r + 0.1); m.y = closest.y + ny * (m.r + 0.1);

                    // Propellera lineārais ātrums punktā
                    let rx = closest.x - sp.x; let ry = closest.y - sp.y;
                    let rDist = Math.sqrt(rx*rx + ry*ry);
                    let tanX = -ry / (rDist || 1); let tanY = rx / (rDist || 1);
                    let spinVel = rDist * sp.speed;
                    let svX = tanX * spinVel; let svY = tanY * spinVel;

                    let dot = (m.vx - svX) * nx + (m.vy - svY) * ny;
                    m.vx = (m.vx - 2 * dot * nx) * bounce + svX * 0.8;
                    m.vy = (m.vy - 2 * dot * ny) * bounce + svY * 0.8;
                }
            });

            // Tapiņas
            pins.forEach(p => {
                let dx = m.x - p.x; let dy = m.y - p.y; let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < m.r + p.r) {
                    let nx = dx / dist; let ny = dy / dist;
                    m.x = p.x + nx * (m.r + p.r + 0.1);
                    let dot = m.vx * nx + m.vy * ny;
                    m.vx = (m.vx - 2 * dot * nx) * bounce + (Math.random() - 0.5) * 2.2;
                    m.vy = (m.vy - 2 * dot * ny) * bounce;
                }
            });

            // Bamperi
            bumpers.forEach(b => {
                let dx = m.x - b.x; let dy = m.y - b.y; let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < m.r + b.r) {
                    let nx = dx / dist; let ny = dy / dist;
                    m.x = b.x + nx * (m.r + b.r + 0.2);
                    m.vx = nx * 11 * m.speedMultiplier; m.vy = ny * 11 * m.speedMultiplier;
                }
            });

            // Savstarpējās bumbiņu sadursmes ar haosu
            marbles.forEach(other => {
                if (m === other || other.done) return;
                let dx = other.x - m.x; let dy = other.y - m.y; let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < m.r + other.r) {
                    let overlap = (m.r + other.r) - dist;
                    let nx = dx / (dist || 1); let ny = dy / (dist || 1);
                    
                    m.x -= nx * overlap * 0.08; m.y -= ny * overlap * 0.08;
                    
                    let tx = m.vx; 
                    m.vx = other.vx * 0.95 + (Math.random() - 0.5) * 1.5; 
                    other.vx = tx * 0.95 + (Math.random() - 0.5) * 1.5;
                }
            });

            // Pretaizķeršanās sistēma
            if (Math.abs(m.vx) < 0.2 && Math.abs(m.vy) < 0.3) {
                m.stuckTimer++;
                if (m.stuckTimer > 3) { 
                    m.vx += (Math.random() > 0.5 ? 6 : -6); m.vy += 4;
                    m.stuckTimer = 0;
                }
            } else { m.stuckTimer = 0; }

            // Finišēšana
            if (m.y >= trackHeight - 40) {
                m.done = true; m.vx = 0; m.vy = 0; m.y = trackHeight - 20;
                finishedMarbles.push(m);
                if (finishedMarbles.length === marbles.length) raceOver = true;
            }
            if (m.y > leadingY && !m.done) leadingY = m.y;
        });

        if (!raceOver && leadingY > canvas.height / 2) {
            let targetY = leadingY - canvas.height / 2;
            cameraY += (targetY - cameraY) * 0.25;
            if (cameraY > trackHeight - canvas.height) cameraY = trackHeight - canvas.height;
        }

        let sorted = [...marbles].sort((a, b) => {
            if (a.done && b.done) return finishedMarbles.indexOf(a) - finishedMarbles.indexOf(b);
            if (a.done) return -1; if (b.done) return 1; return b.y - a.y;
        });
        updateLeaderboardUI(sorted);
    }

    function updateLeaderboardUI(sortedMarbles) {
        const board = document.getElementById('leaderboard'); board.innerHTML = '';
        sortedMarbles.forEach((m, idx) => {
            let txt = m.done ? `FINIŠS (${finishedMarbles.indexOf(m)+1}.)` : `${Math.round(m.y / 20)}m`;
            board.innerHTML += `
                <div class="leader-item" style="border-left: 5px solid ${m.color}; background: #070a13;">
                    <span>POS ${idx + 1}: ${m.name}</span><span>${txt}</span>
                </div>
            `;
        });
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save(); ctx.translate(0, -cameraY);

        // Apmales
        ctx.fillStyle = '#1e293b'; ctx.fillRect(0, 0, 10, trackHeight); ctx.fillRect(canvas.width - 10, 0, 10, trackHeight);

        // Neon trases līnijas
        ctx.strokeStyle = '#2d3748'; ctx.lineWidth = 6; ctx.lineCap = 'round';
        ctx.shadowColor = 'rgba(56, 189, 248, 0.15)'; ctx.shadowBlur = 4;
        lines.forEach(l => { ctx.beginPath(); ctx.moveTo(l.x1, l.y1); ctx.lineTo(l.x2, l.y2); ctx.stroke(); });
        ctx.shadowBlur = 0; 

        // Kustīgie vārti
        ctx.fillStyle = '#f59e0b';
        movingSliders.forEach(s => {
            ctx.fillRect(s.x - s.w/2, s.y - s.h/2, s.w, s.h);
        });

        // Rotējošie propelleri
        ctx.strokeStyle = '#38bdf8'; ctx.lineWidth = 5; ctx.lineCap = 'round';
        spinners.forEach(sp => {
            ctx.beginPath();
            let x1 = sp.x - Math.cos(sp.angle) * sp.length;
            let y1 = sp.y - Math.sin(sp.angle) * sp.length;
            let x2 = sp.x + Math.cos(sp.angle) * sp.length;
            let y2 = sp.y + Math.sin(sp.angle) * sp.length;
            ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
            ctx.stroke();
            
            // Centra ass propelleram
            ctx.beginPath(); ctx.arc(sp.x, sp.y, 6, 0, Math.PI*2); ctx.fillStyle = '#ffffff'; ctx.fill();
        });

        // Tapiņas
        pins.forEach(p => {
            ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fillStyle = '#475569'; ctx.fill();
        });

        // Bamperi
        bumpers.forEach(b => {
            ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fillStyle = '#ef4444'; ctx.fill();
            ctx.beginPath(); ctx.arc(b.x, b.y, b.r - 5, 0, Math.PI*2); ctx.fillStyle = '#090d16'; ctx.fill();
        });

        // Finiša zona
        ctx.fillStyle = '#10b981'; ctx.fillRect(10, trackHeight - 45, canvas.width - 20, 45);
        ctx.fillStyle = '#ffffff'; ctx.font = 'bold 14px system-ui'; ctx.textAlign = 'center';
        ctx.fillText("FINIŠA LĪNIJA", canvas.width / 2, trackHeight - 18);

        // Bumbiņas
        marbles.forEach(m => {
            ctx.save(); ctx.beginPath(); ctx.arc(m.x, m.y, m.r, 0, Math.PI * 2); ctx.clip();
            if (m.img) {
                ctx.drawImage(m.img, m.x - m.r, m.y - m.r, m.r * 2, m.r * 2);
            } else {
                ctx.fillStyle = m.color; ctx.fill();
            }
            ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 2.5; ctx.stroke(); ctx.restore();
        });

        ctx.restore();

        // Rezultātu logs uzvarētājiem
        if (raceOver) {
            ctx.fillStyle = 'rgba(5, 7, 15, 0.96)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#38bdf8'; ctx.font = 'bold 22px system-ui'; ctx.textAlign = 'center';
            ctx.fillText("FINIŠA REZULTĀTI", canvas.width / 2, 160);
            finishedMarbles.forEach((m, idx) => {
                if (idx > 4) return; ctx.font = 'bold 15px system-ui'; ctx.fillStyle = m.color;
                ctx.fillText(`${idx + 1}. VIETA — ${m.name}`, canvas.width / 2, 230 + idx * 40);
            });
        }
    }

    function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }

    renderEditorUI(); startRace(); gameLoop();
</script>

</body>
</html>
