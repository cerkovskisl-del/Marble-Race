<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega Marble Race Grand Prix</title>
    <style>
        body {
            margin: 0;
            background: #1a1a24;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        #game-container {
            display: flex;
            gap: 20px;
            background: #242432;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #sidebar {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 200px;
        }
        .panel {
            background: #15151f;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #333;
        }
        h2 { margin-top: 0; font-size: 16px; color: #00d2d3; text-align: center; mb: 10px;}
        .leader-item {
            display: flex;
            justify-content: space-between;
            margin: 6px 0;
            padding: 5px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 14px;
        }
        canvas {
            background: #0d0d13;
            border: 3px solid #3d3d5c;
            border-radius: 8px;
        }
        button {
            padding: 10px;
            font-size: 14px;
            font-weight: bold;
            background: #10ac84;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        button:hover { background: #1dd1a1; transform: scale(1.02); }
        
        .map-btn {
            background: #2e2e42;
            border: 1px solid #4d4d6e;
            margin-bottom: 5px;
            width: 100%;
            text-align: left;
            padding: 8px 12px;
        }
        .map-btn:hover { background: #3e3e59; }
        .map-btn.active {
            background: #341f97;
            border-color: #5f27cd;
            color: #00d2d3;
        }
        .btn-group {
            display: flex;
            flex-direction: column;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="raceCanvas" width="450" height="650"></canvas>
    
    <div id="sidebar">
        <div class="panel">
            <h2>IZVĒLĒTIES KARTI</h2>
            <div class="btn-group">
                <button class="map-btn active" id="map0-btn" onclick="changeMap(0)">1. Klasiskā trase</button>
                <button class="map-btn" id="map1-btn" onclick="changeMap(1)">2. Krustu haoss</button>
                <button class="map-btn" id="map2-btn" onclick="changeMap(2)">3. Plinko kalns</button>
            </div>
        </div>

        <div class="panel">
            <h2>LĪDERI</h2>
            <div id="leaderboard"></div>
        </div>
        
        <button onclick="startRace()">Palaist sacīkstes</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('raceCanvas');
    const ctx = canvas.getContext('2d');

    const gravity = 0.15;
    const bounce = 0.55;
    const trackHeight = 2200; 
    let cameraY = 0;
    let currentMapIndex = 0;

    let marbles = [];
    let staticObstacles = [];
    let spinners = [];
    let finishedMarbles = [];
    let raceOver = false;

    // Karšu ģenerēšanas loģika
    function generateTrack() {
        staticObstacles = [];
        spinners = [];

        // Standarta sākuma un finiša piltuves visām kartēm (drošas)
        staticObstacles.push({ x1: 0, y1: 100, x2: 180, y2: 180 });
        staticObstacles.push({ x1: 450, y1: 100, x2: 270, y2: 180 });
        staticObstacles.push({ x1: 0, y1: 2000, x2: 180, y2: 2080 });
        staticObstacles.push({ x1: 450, y1: 2000, x2: 270, y2: 2080 });

        if (currentMapIndex === 0) {
            // 1. KARTE: Klasiskā ar slīpnēm un dažiem šķēršļiem
            staticObstacles.push(
                { x1: 0, y1: 300, x2: 370, y2: 370 },
                { x1: 80, y1: 550, x2: 450, y2: 620 },
                { x1: 0, y1: 800, x2: 370, y2: 870 },
                { x1: 80, y1: 1200, x2: 450, y2: 1280 },
                { x1: 0, y1: 1500, x2: 370, y2: 1570 },
                { x1: 80, y1: 1750, x2: 450, y2: 1830 }
            );

            // Plinko tapas pa vidu
            for(let row=0; row<5; row++) {
                let pins = row % 2 === 0 ? 6 : 5;
                for(let i=0; i<pins; i++) {
                    let x = (row % 2 === 0) ? (i * 75 + 35) : (i * 75 + 72);
                    staticObstacles.push({ isPin: true, x: x, y: 960 + row * 45, r: 6 });
                }
            }

            spinners = [
                { x: 220, y: 460, size: 40, angle: 0, speed: 0.03 },
                { x: 150, y: 1380, size: 45, angle: 0, speed: -0.02 },
                { x: 300, y: 1650, size: 42, angle: 0, speed: 0.04 }
            ];

        } else if (currentMapIndex === 1) {
            // 2. KARTE: Krustu haoss (daudz rotējošu krustu, maz līniju)
            staticObstacles.push(
                { x1: 0, y1: 600, x2: 150, y2: 640 },
                { x1: 300, y1: 640, x2: 450, y2: 600 },
                { x1: 0, y1: 1300, x2: 200, y2: 1350 },
                { x1: 250, y1: 1350, x2: 450, y2: 1300 }
            );

            // Savieto daudz rotējošus krustus visā trases garumā
            let spinnerPositions = [
                {x: 130, y: 280, sz: 35, sp: 0.04},  {x: 320, y: 280, sz: 35, sp: -0.04},
                {x: 225, y: 440, sz: 50, sp: 0.025},
                {x: 110, y: 750, sz: 40, sp: -0.03}, {x: 340, y: 750, sz: 40, sp: 0.034},
                {x: 225, y: 920, sz: 45, sp: -0.02},
                {x: 120, y: 1100, sz: 38, sp: 0.05}, {x: 330, y: 1100, sz: 38, sp: -0.05},
                {x: 225, y: 1500, sz: 55, sp: 0.015},
                {x: 130, y: 1720, sz: 40, sp: -0.04}, {x: 320, y: 1720, sz: 40, sp: 0.04}
            ];

            spinnerPositions.forEach(pos => {
                spinners.push({ x: pos.x, y: pos.y, size: pos.sz, angle: Math.random()*5, speed: pos.sp });
            });

        } else if (currentMapIndex === 2) {
            // 3. KARTE: Plinko kalns (milzīgs tapu lauks)
            // Lielas sienas-piltuves trases struktūrai
            staticObstacles.push(
                { x1: 0, y1: 400, x2: 140, y2: 460 }, { x1: 450, y1: 400, x2: 310, y2: 460 },
                { x1: 0, y1: 1000, x2: 140, y2: 1060 }, { x1: 450, y1: 1000, x2: 310, y2: 1060 },
                { x1: 0, y1: 1600, x2: 140, y2: 1660 }, { x1: 450, y1: 1600, x2: 310, y2: 1660 }
            );

            // Ģenerē tapu tīklu cauri visai kartei
            for (let y = 240; y < 1950; y += 65) {
                // Izlaiž vietas, kur pārklājas ar vadlīnijām
                if((y>380 && y<480) || (y>980 && y<1080) || (y>1580 && y<1680)) continue;

                let isEven = (Math.floor(y / 65) % 2 === 0);
                let pinsCount = isEven ? 7 : 6;
                let startX = isEven ? 20 : 52;

                for (let i = 0; i < pinsCount; i++) {
                    staticObstacles.push({ isPin: true, x: startX + i * 65, y: y + (Math.random()-0.5)*4, r: 6 });
                }
            }
            
            // Daži mazi rotoriņi kā pārsteiguma elementi
            spinners.push(
                { x: 225, y: 430, size: 25, angle: 0, speed: 0.05 },
                { x: 225, y: 1030, size: 25, angle: 0, speed: -0.05 },
                { x: 225, y: 1630, size: 25, angle: 0, speed: 0.06 }
            );
        }
    }

    function changeMap(index) {
        currentMapIndex = index;
        // Atjaunina pogu vizuālo izskatu
        for(let i=0; i<3; i++) {
            document.getElementById(`map${i}-btn`).classList.remove('active');
        }
        document.getElementById(`map${index}-btn`).classList.add('active');
        startRace();
    }

    function startRace() {
        raceOver = false;
        cameraY = 0;
        finishedMarbles = [];
        generateTrack();

        marbles = [
            { x: 150, y: 40, vx: 0, vy: 0, r: 10, color: '#ff4757', name: 'Sarkanā', done: false },
            { x: 200, y: 40, vx: 0, vy: 0, r: 10, color: '#1e90ff', name: 'Zilā', done: false },
            { x: 250, y: 40, vx: 0, vy: 0, r: 10, color: '#2ed573', name: 'Zaļā', done: false },
            { x: 300, y: 40, vx: 0, vy: 0, r: 10, color: '#ffa502', name: 'Dzeltenā', done: false }
        ];
    }

    function getClosestPointOnLine(px, py, x1, y1, x2, y2) {
        let abx = x2 - x1; let aby = y2 - y1;
        let apx = px - x1; let apy = py - y1;
        let ab_len_sq = abx * abx + aby * aby;
        let t = Math.max(0, Math.min(1, (apx * abx + apy * aby) / ab_len_sq));
        return { x: x1 + t * abx, y: y1 + t * aby };
    }

    function update() {
        spinners.forEach(s => s.angle += s.speed);

        let leadingY = 0;

        marbles.forEach(m => {
            if (m.done) return;

            m.vy += gravity;
            m.x += m.vx; m.y += m.vy;

            // Sienu sadursmes
            if (m.x - m.r < 0) { m.x = m.r; m.vx = -m.vx * (bounce + 0.1); }
            if (m.x + m.r > canvas.width) { m.x = canvas.width - m.r; m.vx = -m.vx * (bounce + 0.1); }

            // Sadursmes ar šķēršļiem
            staticObstacles.forEach(obs => {
                if (obs.isPin) {
                    let dx = m.x - obs.x; let dy = m.y - obs.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < m.r + obs.r) {
                        let nx = dx / dist; let ny = dy / dist;
                        m.x = obs.x + nx * (m.r + obs.r + 1);
                        let dot = m.vx * nx + m.vy * ny;
                        m.vx = (m.vx - 2 * dot * nx) * bounce + (Math.random() - 0.5) * 1.5;
                        m.vy = (m.vy - 2 * dot * ny) * bounce;
                    }
                } else {
                    let closest = getClosestPointOnLine(m.x, m.y, obs.x1, obs.y1, obs.x2, obs.y2);
                    let dx = m.x - closest.x; let dy = m.y - closest.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < m.r) {
                        let nx = dx / dist; let ny = dy / dist;
                        m.x = closest.x + nx * (m.r + 1.5); 
                        let dot = m.vx * nx + m.vy * ny;
                        m.vx = (m.vx - 2 * dot * nx) * bounce;
                        m.vy = (m.vy - 2 * dot * ny) * bounce;
                        m.vx += nx * 0.6 + (Math.random() - 0.5) * 0.4;
                    }
                }
            });

            // Sadursmes ar spinneriem
            spinners.forEach(s => {
                let dx = m.x - s.x; let dy = m.y - s.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < m.r + s.size) {
                    let nx = dx / dist; let ny = dy / dist;
                    m.x = s.x + nx * (m.r + s.size + 2);
                    m.vx = nx * 6 + (Math.random() - 0.5) * 2;
                    m.vy = ny * 4 - 1;
                }
            });

            // Pret-iestrūkšanas drošība (Anti-Stuck)
            if (Math.abs(m.vx) < 0.25 && Math.abs(m.vy) < 0.5) {
                m.vx += (Math.random() - 0.5) * 2;
                m.vy += 0.6;
            }

            // Finišs
            if (m.y >= trackHeight - 50) {
                m.done = true;
                m.vx = 0; m.vy = 0;
                finishedMarbles.push(m);
                if (finishedMarbles.length === marbles.length) raceOver = true;
            }

            if (m.y > leadingY && !m.done) leadingY = m.y;
        });

        // Kameras sekošana līderim
        if (!raceOver && leadingY > canvas.height / 2) {
            let targetCameraY = leadingY - canvas.height / 2;
            cameraY += (targetCameraY - cameraY) * 0.1;
            if (cameraY > trackHeight - canvas.height) cameraY = trackHeight - canvas.height;
        }

        // Kārtošana līderu sarakstam
        let sorted = [...marbles].sort((a, b) => {
            if (a.done && b.done) return finishedMarbles.indexOf(a) - finishedMarbles.indexOf(b);
            if (a.done) return -1;
            if (b.done) return 1;
            return b.y - a.y;
        });

        updateLeaderboardUI(sorted);
    }

    function updateLeaderboardUI(sortedMarbles) {
        const board = document.getElementById('leaderboard');
        board.innerHTML = '';
        sortedMarbles.forEach((m, idx) => {
            let placeStr = m.done ? `Finišs (${finishedMarbles.indexOf(m)+1}.)` : `${Math.round(m.y / 20)}m`;
            board.innerHTML += `
                <div class="leader-item" style="background: ${m.color}33; border-left: 5px solid ${m.color}">
                    <span>${idx + 1}. ${m.name}</span>
                    <span>${placeStr}</span>
                </div>
            `;
        });
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.save();
        ctx.translate(0, -cameraY);

        // Zīmē līnijas un tapas
        ctx.strokeStyle = '#706fd3';
        ctx.lineWidth = 5;
        ctx.lineCap = 'round';
        staticObstacles.forEach(obs => {
            if (obs.isPin) {
                ctx.beginPath();
                ctx.arc(obs.x, obs.y, obs.r, 0, Math.PI*2);
                ctx.fillStyle = '#ffb142';
                ctx.fill();
            } else {
                ctx.beginPath();
                ctx.moveTo(obs.x1, obs.y1);
                ctx.lineTo(obs.x2, obs.y2);
                ctx.stroke();
            }
        });

        // Zīmē spinnerus
        spinners.forEach(s => {
            ctx.save();
            ctx.translate(s.x, s.y);
            ctx.rotate(s.angle);
            ctx.fillStyle = '#ff5252';
            ctx.fillRect(-s.size, -4, s.size*2, 8);
            ctx.fillRect(-4, -s.size, 8, s.size*2);
            ctx.beginPath();
            ctx.arc(0, 0, 8, 0, Math.PI*2);
            ctx.fillStyle = '#fff';
            ctx.fill();
            ctx.restore();
        });

        // Zīmē Finišu
        ctx.fillStyle = '#10ac84';
        ctx.fillRect(0, trackHeight - 40, canvas.width, 40);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 16px Arial';
        ctx.textAlign = 'center';
        ctx.fillText("FINIŠA LĪNIJA", canvas.width / 2, trackHeight - 15);

        // Zīmē bumbiņas
        marbles.forEach(m => {
            ctx.beginPath();
            ctx.arc(m.x, m.y, m.r, 0, Math.PI * 2);
            ctx.fillStyle = m.color;
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.stroke();
        });

        ctx.restore();

        // Rezultātu logi
        if (raceOver) {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 28px Arial';
            ctx.textAlign = 'center';
            ctx.fillText("SACĪKŠU REZULTĀTI", canvas.width / 2, 200);

            finishedMarbles.slice(0, 3).forEach((m, idx) => {
                ctx.font = '20px Arial';
                ctx.fillStyle = m.color;
                ctx.fillText(`${idx + 1}. Vieta: ${m.name} bumbiņa`, canvas.width / 2, 260 + idx * 40);
            });
        }
    }

    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    startRace();
    gameLoop();
</script>

</body>
</html>
