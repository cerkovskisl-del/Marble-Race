<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega Marble Race Grand Prix</title>
    <style>
        body {
            margin: 0;
            background: #1a1a24;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        #game-container {
            display: flex;
            gap: 20px;
            background: #242432;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-height: 95vh;
        }
        #sidebar {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 320px;
            overflow-y: auto;
            padding-right: 5px;
        }
        .panel {
            background: #15151f;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #333;
        }
        h2 { margin-top: 0; font-size: 16px; color: #00d2d3; text-align: center; margin-bottom: 10px; }
        
        /* Bumbiņu saraksta stili */
        #editor-rows-container {
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 10px;
            padding-right: 3px;
        }
        .marble-edit-row {
            display: flex;
            gap: 5px;
            margin-bottom: 6px;
            align-items: center;
            background: #1d1d2b;
            padding: 4px;
            border-radius: 6px;
        }
        .marble-edit-row input[type="text"] {
            background: #2e2e42;
            border: 1px solid #4d4d6e;
            color: white;
            padding: 4px;
            border-radius: 4px;
            font-size: 12px;
        }
        .marble-name-input { width: 80px; }
        .marble-img-input { flex-grow: 1; }
        .marble-color-input { width: 30px; height: 24px; border: none; cursor: pointer; background: none; padding: 0; }
        
        .delete-btn {
            background: #ff4757;
            padding: 4px 8px;
            font-size: 11px;
            border-radius: 4px;
        }
        .delete-btn:hover { background: #ff6b81; }

        .leader-item {
            display: flex;
            justify-content: space-between;
            margin: 6px 0;
            padding: 5px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 14px;
        }
        /* Ja bumbiņu ir daudz, ierobežojam līderu saraksta vizuālo augstumu */
        #leaderboard {
            max-height: 180px;
            overflow-y: auto;
        }
        canvas {
            background: #0d0d13;
            border: 3px solid #3d3d5c;
            border-radius: 8px;
        }
        button {
            padding: 10px;
            font-size: 14px;
            font-weight: bold;
            background: #10ac84;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        button:hover { background: #1dd1a1; transform: scale(1.02); }
        
        .secondary-btn {
            background: #54a0ff;
            width: 100%;
            margin-bottom: 5px;
        }
        .secondary-btn:hover { background: #70a1ff; }

        .map-btn {
            background: #2e2e42;
            border: 1px solid #4d4d6e;
            margin-bottom: 5px;
            width: 100%;
            text-align: left;
            padding: 8px 12px;
        }
        .map-btn:hover { background: #3e3e59; }
        .map-btn.active {
            background: #341f97;
            border-color: #5f27cd;
            color: #00d2d3;
        }
        .btn-group { display: flex; flex-direction: column; }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="raceCanvas" width="450" height="650"></canvas>
    
    <div id="sidebar">
        <div class="panel">
            <h2>IZVĒLĒTIES KARTI</h2>
            <div class="btn-group">
                <button class="map-btn active" id="map0-btn" onclick="changeMap(0)">1. Klasiskā trase</button>
                <button class="map-btn" id="map1-btn" onclick="changeMap(1)">2. Krustu haoss</button>
                <button class="map-btn" id="map2-btn" onclick="changeMap(2)">3. Plinko kalns</button>
            </div>
        </div>

        <div class="panel">
            <h2>BUMBIŅU SARAKSTS</h2>
            <div id="editor-rows-container"></div>
            <button class="secondary-btn" onclick="addMarbleRow()">+ Pievienot bumbiņu</button>
        </div>

        <div class="panel">
            <h2>LĪDERI</h2>
            <div id="leaderboard"></div>
        </div>
        
        <button onclick="startRace()">Palaist sacīkstes</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('raceCanvas');
    const ctx = canvas.getContext('2d');

    const gravity = 0.15;
    const bounce = 0.55;
    const trackHeight = 2200; 
    let cameraY = 0;
    let currentMapIndex = 0;

    let marbles = [];
    let staticObstacles = [];
    let spinners = [];
    let finishedMarbles = [];
    let raceOver = false;

    // Sākotnējais saraksts, kuru lietotājs var bezgalīgi papildināt
    let marblesList = [
        { name: 'Sarkanā', color: '#ff4757', imgUrl: '' },
        { name: 'Zilā', color: '#1e90ff', imgUrl: '' },
        { name: 'Zaļā', color: '#2ed573', imgUrl: '' },
        { name: 'Dzeltenā', color: '#ffa502', imgUrl: '' }
    ];

    // Funkcija, kas pārzīmē redaktora rindas
    function renderEditorUI() {
        const container = document.getElementById('editor-rows-container');
        container.innerHTML = '';

        marblesList.forEach((marble, i) => {
            container.innerHTML += `
                <div class="marble-edit-row">
                    <input type="color" class="marble-color-input" id="m-color-${i}" value="${marble.color}" onchange="saveUIData(${i})">
                    <input type="text" class="marble-name-input" id="m-name-${i}" value="${marble.name}" placeholder="Vārds" onchange="saveUIData(${i})">
                    <input type="text" class="marble-img-input" id="m-img-${i}" value="${marble.imgUrl}" placeholder="Bildes URL" onchange="saveUIData(${i})">
                    <button class="delete-btn" onclick="deleteMarbleRow(${i})">X</button>
                </div>
            `;
        });
    }

    // Saglabā ierakstīto info masīvā pirms pārzīmēšanas vai starta
    function saveUIData(i) {
        let nameVal = document.getElementById(`m-name-${i}`).value;
        let colorVal = document.getElementById(`m-color-${i}`).value;
        let imgVal = document.getElementById(`m-img-${i}`).value.trim();

        marblesList[i].name = nameVal;
        marblesList[i].color = colorVal;
        marblesList[i].imgUrl = imgVal;
    }

    function saveAllUIData() {
        marblesList.forEach((_, i) => saveUIData(i));
    }

    // Pievieno jaunu tukšu rindas ierakstu
    function addMarbleRow() {
        saveAllUIData();
        // Uzģenerē random krāsu jaunajai bumbai
        let randomColor = '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
        marblesList.push({
            name: `Bumba ${marblesList.length + 1}`,
            color: randomColor,
            imgUrl: ''
        });
        renderEditorUI();
    }

    // Izdzēš konkrētu bumbiņu
    function deleteMarbleRow(index) {
        saveAllUIData();
        if (marblesList.length <= 1) {
            alert("Jāpaliek vismaz vienai bumbiņai!");
            return;
        }
        marblesList.splice(index, 1);
        renderEditorUI();
    }

    // Ģenerē trases šķēršļus
    function generateTrack() {
        staticObstacles = [];
        spinners = [];

        staticObstacles.push({ x1: 0, y1: 100, x2: 180, y2: 180 });
        staticObstacles.push({ x1: 450, y1: 100, x2: 270, y2: 180 });
        staticObstacles.push({ x1: 0, y1: 2000, x2: 180, y2: 2080 });
        staticObstacles.push({ x1: 450, y1: 2000, x2: 270, y2: 2080 });

        if (currentMapIndex === 0) {
            staticObstacles.push(
                { x1: 0, y1: 300, x2: 370, y2: 370 },
                { x1: 80, y1: 550, x2: 450, y2: 620 },
                { x1: 0, y1: 800, x2: 370, y2: 870 },
                { x1: 80, y1: 1200, x2: 450, y2: 1280 },
                { x1: 0, y1: 1500, x2: 370, y2: 1570 },
                { x1: 80, y1: 1750, x2: 450, y2: 1830 }
            );
            for(let row=0; row<5; row++) {
                let pins = row % 2 === 0 ? 6 : 5;
                for(let i=0; i<pins; i++) {
                    let x = (row % 2 === 0) ? (i * 75 + 35) : (i * 75 + 72);
                    staticObstacles.push({ isPin: true, x: x, y: 960 + row * 45, r: 6 });
                }
            }
            spinners = [
                { x: 220, y: 460, size: 40, angle: 0, speed: 0.03 },
                { x: 150, y: 1380, size: 45, angle: 0, speed: -0.02 },
                { x: 300, y: 1650, size: 42, angle: 0, speed: 0.04 }
            ];
        } else if (currentMapIndex === 1) {
            staticObstacles.push(
                { x1: 0, y1: 600, x2: 150, y2: 640 }, { x1: 300, y1: 640, x2: 450, y2: 600 },
                { x1: 0, y1: 1300, x2: 200, y2: 1350 }, { x1: 250, y1: 1350, x2: 450, y2: 1300 }
            );
            let spinnerPositions = [
                {x: 130, y: 280, sz: 35, sp: 0.04},  {x: 320, y: 280, sz: 35, sp: -0.04},
                {x: 225, y: 440, sz: 50, sp: 0.025},
                {x: 110, y: 750, sz: 40, sp: -0.03}, {x: 340, y: 750, sz: 40, sp: 0.034},
                {x: 225, y: 920, sz: 45, sp: -0.02},
                {x: 120, y: 1100, sz: 38, sp: 0.05}, {x: 330, y: 1100, sz: 38, sp: -0.05},
                {x: 225, y: 1500, sz: 55, sp: 0.015},
                {x: 130, y: 1720, sz: 40, sp: -0.04}, {x: 320, y: 1720, sz: 40, sp: 0.04}
            ];
            spinnerPositions.forEach(pos => {
                spinners.push({ x: pos.x, y: pos.y, size: pos.sz, angle: Math.random()*5, speed: pos.sp });
            });
        } else if (currentMapIndex === 2) {
            staticObstacles.push(
                { x1: 0, y1: 400, x2: 140, y2: 460 }, { x1: 450, y1: 400, x2: 310, y2: 460 },
                { x1: 0, y1: 1000, x2: 140, y2: 1060 }, { x1: 450, y1: 1000, x2: 310, y2: 1060 },
                { x1: 0, y1: 1600, x2: 140, y2: 1660 }, { x1: 450, y1: 1600, x2: 310, y2: 1660 }
            );
            for (let y = 240; y < 1950; y += 65) {
                if((y>380 && y<480) || (y>980 && y<1080) || (y>1580 && y<1680)) continue;
                let isEven = (Math.floor(y / 65) % 2 === 0);
                let pinsCount = isEven ? 7 : 6;
                let startX = isEven ? 20 : 52;
                for (let i = 0; i < pinsCount; i++) {
                    staticObstacles.push({ isPin: true, x: startX + i * 65, y: y + (Math.random()-0.5)*4, r: 6 });
                }
            }
            spinners.push(
                { x: 225, y: 430, size: 25, angle: 0, speed: 0.05 },
                { x: 225, y: 1030, size: 25, angle: 0, speed: -0.05 },
                { x: 225, y: 1630, size: 25, angle: 0, speed: 0.06 }
            );
        }
    }

    function changeMap(index) {
        currentMapIndex = index;
        for(let i=0; i<3; i++) document.getElementById(`map${i}-btn`).classList.remove('active');
        document.getElementById(`map${index}-btn`).classList.add('active');
        startRace();
    }

    function startRace() {
        saveAllUIData();
        raceOver = false;
        cameraY = 0;
        finishedMarbles = [];
        generateTrack();

        marbles = [];

        marblesList.forEach((data, i) => {
            let imgObj = null;
            if (data.imgUrl !== '') {
                imgObj = new Image();
                imgObj.src = data.imgUrl;
            }

            // Ja bumbiņu ir ļoti daudz, liekam tās nejaušā pozīcijā augšā, lai nesaspiestos vienā vietā
            let startX = 50 + Math.random() * 350;
            let startY = 20 - (Math.random() * 30); // daļa sāk nedaudz augstāk gaisā

            marbles.push({
                x: startX,
                y: startY,
                vx: (Math.random() - 0.5) * 1.5,
                vy: 0,
                r: 10,
                color: data.color,
                name: data.name,
                img: imgObj,
                done: false
            });
        });
    }

    function getClosestPointOnLine(px, py, x1, y1, x2, y2) {
        let abx = x2 - x1; let aby = y2 - y1;
        let apx = px - x1; let apy = py - y1;
        let ab_len_sq = abx * abx + aby * aby;
        let t = Math.max(0, Math.min(1, (apx * abx + apy * aby) / ab_len_sq));
        return { x: x1 + t * abx, y: y1 + t * aby };
    }

    function update() {
        spinners.forEach(s => s.angle += s.speed);
        let leadingY = 0;

        marbles.forEach(m => {
            if (m.done) return;

            m.vy += gravity;
            m.x += m.vx; m.y += m.vy;

            // Sienu sadursmes
            if (m.x - m.r < 0) { m.x = m.r; m.vx = -m.vx * (bounce + 0.1); }
            if (m.x + m.r > canvas.width) { m.x = canvas.width - m.r; m.vx = -m.vx * (bounce + 0.1); }

            // Sadursmes ar šķēršļiem
            staticObstacles.forEach(obs => {
                if (obs.isPin) {
                    let dx = m.x - obs.x; let dy = m.y - obs.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < m.r + obs.r) {
                        let nx = dx / dist; let ny = dy / dist;
                        m.x = obs.x + nx * (m.r + obs.r + 1);
                        let dot = m.vx * nx + m.vy * ny;
                        m.vx = (m.vx - 2 * dot * nx) * bounce + (Math.random() - 0.5) * 1.5;
                        m.vy = (m.vy - 2 * dot * ny) * bounce;
                    }
                } else {
                    let closest = getClosestPointOnLine(m.x, m.y, obs.x1, obs.y1, obs.x2, obs.y2);
                    let dx = m.x - closest.x; let dy = m.y - closest.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < m.r) {
                        let nx = dx / dist; let ny = dy / dist;
                        m.x = closest.x + nx * (m.r + 1.5); 
                        let dot = m.vx * nx + m.vy * ny;
                        m.vx = (m.vx - 2 * dot * nx) * bounce;
                        m.vy = (m.vy - 2 * dot * ny) * bounce;
                        m.vx += nx * 0.6 + (Math.random() - 0.5) * 0.4;
                    }
                }
            });

            // Savstarpējā bumbiņu grūstīšanās, ja to ir daudz (vienkāršotā fizika veiktspējai)
            marbles.forEach(other => {
                if (m === other || other.done) return;
                let dx = other.x - m.x;
                let dy = other.y - m.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < m.r + other.r) {
                    let overlap = (m.r + other.r) - dist;
                    let nx = dx / (dist || 1);
                    let ny = dy / (dist || 1);
                    // Atbīda vienu no otras
                    m.x -= nx * overlap * 0.5;
                    m.y -= ny * overlap * 0.5;
                    // Samaina ātrumus nedaudz
                    let tempX = m.vx;
                    m.vx = other.vx * 0.8;
                    other.vx = tempX * 0.8;
                }
            });

            // Sadursmes ar spinneriem
            spinners.forEach(s => {
                let dx = m.x - s.x; let dy = m.y - s.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < m.r + s.size) {
                    let nx = dx / dist; let ny = dy / dist;
                    m.x = s.x + nx * (m.r + s.size + 2);
                    m.vx = nx * 6 + (Math.random() - 0.5) * 2;
                    m.vy = ny * 4 - 1;
                }
            });

            // Anti-Stuck sistēma
            if (Math.abs(m.vx) < 0.25 && Math.abs(m.vy) < 0.5) {
                m.vx += (Math.random() - 0.5) * 2;
                m.vy += 0.6;
            }

            // Finišs
            if (m.y >= trackHeight - 50) {
                m.done = true;
                m.vx = 0; m.vy = 0;
                finishedMarbles.push(m);
                if (finishedMarbles.length === marbles.length) raceOver = true;
            }

            if (m.y > leadingY && !m.done) leadingY = m.y;
        });

        // Kameras sekošana līderim
        if (!raceOver && leadingY > canvas.height / 2) {
            let targetCameraY = leadingY - canvas.height / 2;
            cameraY += (targetCameraY - cameraY) * 0.1;
            if (cameraY > trackHeight - canvas.height) cameraY = trackHeight - canvas.height;
        }

        let sorted = [...marbles].sort((a, b) => {
            if (a.done && b.done) return finishedMarbles.indexOf(a) - finishedMarbles.indexOf(b);
            if (a.done) return -1;
            if (b.done) return 1;
            return b.y - a.y;
        });

        updateLeaderboardUI(sorted);
    }

    function updateLeaderboardUI(sortedMarbles) {
        const board = document.getElementById('leaderboard');
        board.innerHTML = '';
        sortedMarbles.forEach((m, idx) => {
            let placeStr = m.done ? `Finišs (${finishedMarbles.indexOf(m)+1}.)` : `${Math.round(m.y / 20)}m`;
            board.innerHTML += `
                <div class="leader-item" style="background: ${m.color}33; border-left: 5px solid ${m.color}">
                    <span>${idx + 1}. ${m.name}</span>
                    <span>${placeStr}</span>
                </div>
            `;
        });
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.save();
        ctx.translate(0, -cameraY);

        // Zīmē līnijas un tapas
        ctx.strokeStyle = '#706fd3';
        ctx.lineWidth = 5;
        ctx.lineCap = 'round';
        staticObstacles.forEach(obs => {
            if (obs.isPin) {
                ctx.beginPath();
                ctx.arc(obs.x, obs.y, obs.r, 0, Math.PI*2);
                ctx.fillStyle = '#ffb142';
                ctx.fill();
            } else {
                ctx.beginPath();
                ctx.moveTo(obs.x1, obs.y1);
                ctx.lineTo(obs.x2, obs.y2);
                ctx.stroke();
            }
        });

        // Zīmē spinnerus
        spinners.forEach(s => {
            ctx.save();
            ctx.translate(s.x, s.y);
            ctx.rotate(s.angle);
            ctx.fillStyle = '#ff5252';
            ctx.fillRect(-s.size, -4, s.size*2, 8);
            ctx.fillRect(-4, -s.size, 8, s.size*2);
            ctx.beginPath();
            ctx.arc(0, 0, 8, 0, Math.PI*2);
            ctx.fillStyle = '#fff';
            ctx.fill();
            ctx.restore();
        });

        // Finiša līnija
        ctx.fillStyle = '#10ac84';
        ctx.fillRect(0, trackHeight - 40, canvas.width, 40);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 16px Arial';
        ctx.textAlign = 'center';
        ctx.fillText("FINIŠA LĪNIJA", canvas.width / 2, trackHeight - 15);

        // Zīmē bumbiņas
        marbles.forEach(m => {
            ctx.save();
            ctx.beginPath();
            ctx.arc(m.x, m.y, m.r, 0, Math.PI * 2);
            ctx.closePath();

            if (m.img && m.img.complete && m.img.naturalWidth !== 0) {
                ctx.clip();
                ctx.drawImage(m.img, m.x - m.r, m.y - m.r, m.r * 2, m.r * 2);
            } else {
                ctx.fillStyle = m.color;
                ctx.fill();
            }
            
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 1.5;
            ctx.stroke();
            ctx.restore();
        });

        ctx.restore();

        // Rezultātu logs (rāda tikai TOP 5, lai neaizpildītu visu ekrānu pie bezgalīga skaita)
        if (raceOver) {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 28px Arial';
            ctx.textAlign = 'center';
            ctx.fillText("SACĪKŠU REZULTĀTI", canvas.width / 2, 160);

            finishedMarbles.forEach((m, idx) => {
                if (idx > 4) return; 
                ctx.font = '18px Arial';
                ctx.fillStyle = m.color;
                ctx.fillText(`${idx + 1}. Vieta: ${m.name}`, canvas.width / 2, 230 + idx * 35);
            });
        }
    }

    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    // Inicializācija
    renderEditorUI();
    startRace();
    gameLoop();
</script>

</body>
</html>
