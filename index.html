<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega Marble Race Grand Prix</title>
    <style>
        body {
            margin: 0;
            background: #1a1a24;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        #game-container {
            display: flex;
            gap: 20px;
            background: #242432;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #sidebar {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 200px;
        }
        .panel {
            background: #15151f;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #333;
        }
        h2 { margin-top: 0; font-size: 18px; color: #00d2d3; text-align: center; }
        .leader-item {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            padding: 5px;
            border-radius: 5px;
            font-weight: bold;
        }
        canvas {
            background: #0d0d13;
            border: 3px solid #3d3d5c;
            border-radius: 8px;
        }
        button {
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            background: #10ac84;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #1dd1a1; }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="raceCanvas" width="450" height="650"></canvas>
    
    <div id="sidebar">
        <div class="panel">
            <h2>LĪDERI</h2>
            <div id="leaderboard"></div>
        </div>
        
        <button onclick="startRace()">Palaist jaunas sacīkstes</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('raceCanvas');
    const ctx = canvas.getContext('2d');

    const gravity = 0.15;
    const bounce = 0.55;
    const trackHeight = 2200; // Trases kopējais garums uz leju
    let cameraY = 0;

    let marbles = [];
    let staticObstacles = [];
    let spinners = [];
    let finishedMarbles = [];
    let raceOver = false;

    // Ģenerē trases šķēršļus
    function generateTrack() {
        staticObstacles = [
            // Sākuma piltuve
            { x1: 0, y1: 100, x2: 180, y2: 180 },
            { x1: 450, y1: 100, x2: 270, y2: 180 },
            // Zig-zag līnijas
            { x1: 0, y1: 300, x2: 320, y2: 380 },
            { x1: 450, y1: 500, x2: 130, y2: 580 },
            { x1: 0, y1: 700, x2: 320, y2: 780 },
            // Lielie slaidi zemāk
            { x1: 100, y1: 1100, x2: 450, y2: 1200 },
            { x1: 0, y1: 1350, x2: 350, y2: 1450 },
            { x1: 100, y1: 1650, x2: 450, y2: 1750 },
            // Finiša piltuve
            { x1: 0, y1: 1950, x2: 180, y2: 2050 },
            { x1: 450, y1: 1950, x2: 270, y2: 2050 }
        ];

        // Plinko tapas (mazi aplīši) vidusdaļā (no 850 līdz 1050 augstumam)
        for(let row=0; row<4; row++) {
            let pins = row % 2 === 0 ? 6 : 5;
            for(let i=0; i<pins; i++) {
                let x = (row % 2 === 0) ? (i * 80 + 25) : (i * 80 + 65);
                let y = 850 + row * 50;
                staticObstacles.push({ isPin: true, x: x, y: y, r: 6 });
            }
        }

        // Rotējošie šķēršļi (spinners)
        spinners = [
            { x: 220, y: 440, size: 40, angle: 0, speed: 0.03 },
            { x: 120, y: 1280, size: 45, angle: 0, speed: -0.02 },
            { x: 320, y: 1550, size: 45, angle: 0, speed: 0.045 }
        ];
    }

    function startRace() {
        raceOver = false;
        cameraY = 0;
        finishedMarbles = [];
        generateTrack();

        marbles = [
            { x: 150, y: 40, vx: 0, vy: 0, r: 10, color: '#ff4757', name: 'Sarkanā', rank: 1, done: false },
            { x: 200, y: 40, vx: 0, vy: 0, r: 10, color: '#1e90ff', name: 'Zilā', rank: 2, done: false },
            { x: 250, y: 40, vx: 0, vy: 0, r: 10, color: '#2ed573', name: 'Zaļā', rank: 3, done: false },
            { x: 300, y: 40, vx: 0, vy: 0, r: 10, color: '#ffa502', name: 'Dzeltenā', rank: 4, done: false }
        ];
    }

    function getClosestPointOnLine(px, py, x1, y1, x2, y2) {
        let abx = x2 - x1; let aby = y2 - y1;
        let apx = px - x1; let apy = py - y1;
        let ab_len_sq = abx * abx + aby * aby;
        let t = Math.max(0, Math.min(1, (apx * abx + apy * aby) / ab_len_sq));
        return { x: x1 + t * abx, y: y1 + t * aby };
    }

    function update() {
        // Rotē šķēršļus
        spinners.forEach(s => s.angle += s.speed);

        let leadingY = 0;

        marbles.forEach(m => {
            if (m.done) return;

            m.vy += gravity;
            m.x += m.vx; m.y += m.vy;

            // Sienu sadursmes
            if (m.x - m.r < 0) { m.x = m.r; m.vx = -m.vx * bounce; }
            if (m.x + m.r > canvas.width) { m.x = canvas.width - m.r; m.vx = -m.vx * bounce; }

            // Sadursmes ar statiskajām līnijām un tapām
            staticObstacles.forEach(obs => {
                if (obs.isPin) {
                    let dx = m.x - obs.x; let dy = m.y - obs.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < m.r + obs.r) {
                        let nx = dx / dist; let ny = dy / dist;
                        m.x = obs.x + nx * (m.r + obs.r);
                        let dot = m.vx * nx + m.vy * ny;
                        m.vx = (m.vx - 2 * dot * nx) * bounce + (Math.random() - 0.5) * 0.4;
                        m.vy = (m.vy - 2 * dot * ny) * bounce;
                    }
                } else {
                    let closest = getClosestPointOnLine(m.x, m.y, obs.x1, obs.y1, obs.x2, obs.y2);
                    let dx = m.x - closest.x; let dy = m.y - closest.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < m.r) {
                        let nx = dx / dist; let ny = dy / dist;
                        m.x = closest.x + nx * m.r;
                        let dot = m.vx * nx + m.vy * ny;
                        m.vx = (m.vx - 2 * dot * nx) * bounce;
                        m.vy = (m.vy - 2 * dot * ny) * bounce;
                        m.vx += (Math.random() - 0.5) * 0.1; // neļauj iesprūst
                    }
                }
            });

            // Sadursmes ar rotējošajiem šķēršļiem
            spinners.forEach(s => {
                let dx = m.x - s.x; let dy = m.y - s.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < m.r + s.size) {
                    let nx = dx / dist; let ny = dy / dist;
                    m.x = s.x + nx * (m.r + s.size);
                    // Atgrūž bumbiņu ar rotācijas spēku
                    m.vx = nx * 4 + (Math.random() - 0.5) * 2;
                    m.vy = ny * 3 - 1;
                }
            });

            // Finiša sasniegšana
            if (m.y >= trackHeight - 50) {
                m.done = true;
                m.vx = 0; m.vy = 0;
                finishedMarbles.push(m);
                if (finishedMarbles.length === marbles.length) raceOver = true;
            }

            if (m.y > leadingY && !m.done) leadingY = m.y;
        });

        // Kameru sekošana līderim
        if (!raceOver && leadingY > canvas.height / 2) {
            let targetCameraY = leadingY - canvas.height / 2;
            cameraY += (targetCameraY - cameraY) * 0.1; // Maiga kameras kustība
            if (cameraY > trackHeight - canvas.height) cameraY = trackHeight - canvas.height;
        }

        // Sakārto bumbiņas pēc pozīcijas (tiem, kas finišēja ir priekšroka)
        let sorted = [...marbles].sort((a, b) => {
            if (a.done && b.done) return finishedMarbles.indexOf(a) - finishedMarbles.indexOf(b);
            if (a.done) return -1;
            if (b.done) return 1;
            return b.y - a.y;
        });

        updateLeaderboardUI(sorted);
    }

    function updateLeaderboardUI(sortedMarbles) {
        const board = document.getElementById('leaderboard');
        board.innerHTML = '';
        sortedMarbles.forEach((m, idx) => {
            let placeStr = m.done ? `Finišs (${finishedMarbles.indexOf(m)+1}.)` : `${Math.round(m.y / 20)}m`;
            board.innerHTML += `
                <div class="leader-item" style="background: ${m.color}33; border-left: 5px solid ${m.color}">
                    <span>${idx + 1}. ${m.name}</span>
                    <span>${placeStr}</span>
                </div>
            `;
        });
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.save();
        ctx.translate(0, -cameraY); // Nobīda visu zīmējumu atbilstoši kamerai

        // Zīmē statiskās līnijas un tapas
        ctx.strokeStyle = '#706fd3';
        ctx.lineWidth = 5;
        ctx.lineCap = 'round';
        staticObstacles.forEach(obs => {
            if (obs.isPin) {
                ctx.beginPath();
                ctx.arc(obs.x, obs.y, obs.r, 0, Math.PI*2);
                ctx.fillStyle = '#ffb142';
                ctx.fill();
            } else {
                ctx.beginPath();
                ctx.moveTo(obs.x1, obs.y1);
                ctx.lineTo(obs.x2, obs.y2);
                ctx.stroke();
            }
        });

        // Zīmē rotējošos šķēršļus
        spinners.forEach(s => {
            ctx.save();
            ctx.translate(s.x, s.y);
            ctx.rotate(s.angle);
            ctx.fillStyle = '#ff5252';
            // Zīmē krusta formu
            ctx.fillRect(-s.size, -4, s.size*2, 8);
            ctx.fillRect(-4, -s.size, 8, s.size*2);
            ctx.beginPath();
            ctx.arc(0, 0, 8, 0, Math.PI*2);
            ctx.fillStyle = '#fff';
            ctx.fill();
            ctx.restore();
        });

        // Zīmē Finiša zonu
        ctx.fillStyle = '#10ac84';
        ctx.fillRect(0, trackHeight - 40, canvas.width, 40);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 16px Arial';
        ctx.textAlign = 'center';
        ctx.fillText("FINIŠA LĪNIJA", canvas.width / 2, trackHeight - 15);

        // Zīmē bumbiņas
        marbles.forEach(m => {
            ctx.beginPath();
            ctx.arc(m.x, m.y, m.r, 0, Math.PI * 2);
            ctx.fillStyle = m.color;
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.stroke();
        });

        ctx.restore(); // Atgriež kameru sākumpozīcijā priekš statiskā teksta

        // Ja spēle beigusies, parāda pjedestālu uz ekrāna
        if (raceOver) {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 28px Arial';
            ctx.textAlign = 'center';
            ctx.fillText("SACĪKŠU REZULTĀTI", canvas.width / 2, 200);

            finishedMarbles.slice(0, 3).forEach((m, idx) => {
                ctx.font = '20px Arial';
                ctx.fillStyle = m.color;
                ctx.fillText(`${idx + 1}. Vieta: ${m.name} bumbiņa`, canvas.width / 2, 260 + idx * 40);
            });
        }
    }

    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    startRace();
    gameLoop();
</script>

</body>
</html>
