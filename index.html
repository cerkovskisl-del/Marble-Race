<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Classic Marble Arcade Grand Prix</title>
    <style>
        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; }
        body {
            margin: 0; padding: 0; background: #1a120b; color: #f5f5f5;
            font-family: 'Courier New', Courier, monospace; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            width: 100vw; height: 100vh; overflow: hidden;
        }
        #game-container { position: relative; display: flex; width: 100%; height: 100%; background: #2c1e15; }
        #canvas-container { flex: 1; display: flex; align-items: center; justify-content: center; height: 100%; padding: 10px; }
        canvas {
            background: #d5bdaf; border: 6px double #3d2514; border-radius: 4px;
            max-height: 100%; max-width: 100%; object-fit: contain;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.4), 0 10px 25px rgba(0,0,0,0.7);
        }
        #sidebar {
            width: 340px; height: 100%; background: #3d2514; border-left: 4px solid #2c1e15;
            display: flex; flex-direction: column; gap: 12px; padding: 15px; overflow-y: auto; z-index: 100;
        }
        #toggle-panel-btn {
            display: none; position: absolute; left: -50px; top: 15px; width: 40px; height: 40px;
            background: #d5bdaf; border: 2px solid #3d2514; border-radius: 4px; color: #3d2514;
            font-size: 16px; cursor: pointer; align-items: center; justify-content: center; z-index: 101;
        }
        .panel { background: #2c1e15; padding: 12px; border-radius: 4px; border: 2px solid #e3d5ca; }
        h2 { margin-top: 0; font-size: 14px; color: #eddfd3; text-align: center; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        #editor-rows-container { max-height: 160px; overflow-y: auto; }
        .marble-edit-row {
            display: flex; gap: 5px; margin-bottom: 5px; align-items: center;
            background: #3d2514; padding: 5px; border-radius: 4px; border: 1px solid #e3d5ca;
        }
        .marble-edit-row input[type="text"] {
            background: #2c1e15; border: 1px solid #e3d5ca; color: white; padding: 5px; font-size: 12px; width: 100%; font-family: monospace;
        }
        .marble-color-input { width: 30px; height: 26px; border: none; cursor: pointer; background: none; }
        .delete-btn { background: #9a031e; padding: 5px 8px; font-size: 11px; border-radius: 2px; border: none; color: white; cursor: pointer; font-family: monospace; }
        #leaderboard { max-height: 150px; overflow-y: auto; }
        .leader-item { display: flex; justify-content: space-between; margin: 4px 0; padding: 6px; border-radius: 2px; border: 1px solid rgba(255,255,255,0.2); font-size: 12px; }
        button { padding: 10px; font-size: 13px; font-weight: bold; background: #5f7d95; color: white; border: 2px solid #e3d5ca; border-radius: 4px; cursor: pointer; font-family: monospace; }
        button:hover { background: #7091a9; }
        .secondary-btn { background: #3d2514; width: 100%; }
        .map-btn { background: #3d2514; border: 1px solid #5f7d95; margin-bottom: 5px; width: 100%; text-align: left; padding: 10px; color: #eddfd3; border-radius: 4px; font-family: monospace; }
        .map-btn.active { background: #5f7d95; color: white; border-color: #e3d5ca; }
        #portrait-warning { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #1a120b; z-index: 9999; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        @media (max-width: 900px) and (orientation: landscape) {
            #sidebar { position: absolute; right: 0; top: 0; background: rgba(61, 37, 20, 0.95); }
            #sidebar.hidden { transform: translateX(100%); }
            #toggle-panel-btn { display: flex; }
        }
        @media (orientation: portrait) { #portrait-warning { display: flex; } #game-container { display: none; } }
    </style>
</head>
<body>

<div id="portrait-warning">
    <h1>🔄 LŪDZU PAGRIEZIET IERĪCI</h1>
    <p>Novietojiet ierīci ainavas (Landscape) režīmā.</p>
</div>

<div id="game-container">
    <div id="canvas-container">
        <canvas id="raceCanvas" width="480" height="650"></canvas>
    </div>
    
    <div id="sidebar" class="hidden">
        <div id="toggle-panel-btn" onclick="toggleSidebar()">⚙️</div>

        <div class="panel">
            <h2>TRASAS MODELIS</h2>
            <button class="map-btn active" id="map0-btn" onclick="changeMap(0)">木 1. Koka Slīpumi</button>
            <button class="map-btn" id="map1-btn" onclick="changeMap(1)">🎯 2. Mehāniskie Bamperi</button>
            <button class="map-btn" id="map2-btn" onclick="changeMap(2)">🎰 3. Klasiskais Plinko</button>
        </div>

        <div class="panel">
            <h2>DALĪBNIEKI</h2>
            <div id="editor-rows-container"></div>
            <button class="secondary-btn" onclick="addMarbleRow()">+ Jauna Bumbiņa</button>
        </div>

        <div class="panel">
            <h2>REZULTĀTU TABLE</h2>
            <div id="leaderboard"></div>
        </div>
        
        <button style="margin-top: auto; font-size: 15px; padding: 12px; background: #9a031e; border-color: #e3d5ca;" onclick="startRaceBtn()">🏁 PALAIST BRAUCIENU</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('raceCanvas');
    const ctx = canvas.getContext('2d');

    let audioCtx = null;
    function playClickSound(freq, type="triangle") {
        try {
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = type; osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.05);
        } catch(e){}
    }

    // Klasiskā, smagāka fizika
    const gravity = 0.38;
    const friction = 0.995;
    const bounce = 0.42;
    const trackHeight = 2500;
    let cameraY = 0;
    let currentMapIndex = 0;

    let marbles = [];
    let lines = [];
    let pins = [];
    let bumpers = []; // Trīsstūra mehāniskie bamperi
    let finishedMarbles = [];
    let raceOver = false;

    let marblesList = [
        { name: 'KLASISKS SARKANS', color: '#d90429' },
        { name: 'KLASISKS ZILS', color: '#0077b6' },
        { name: 'ZELTA BUMBA', color: '#ee9b00' },
        { name: 'ZAĻAIS SMARAGDS', color: '#0f4c5c' }
    ];

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('hidden'); }

    function renderEditorUI() {
        const container = document.getElementById('editor-rows-container');
        container.innerHTML = '';
        marblesList.forEach((marble, i) => {
            container.innerHTML += `
                <div class="marble-edit-row">
                    <input type="color" class="marble-color-input" id="m-color-${i}" value="${marble.color}" onchange="saveUIData(${i})">
                    <input type="text" id="m-name-${i}" value="${marble.name}" onchange="saveUIData(${i})">
                    <button class="delete-btn" onclick="deleteMarbleRow(${i})">X</button>
                </div>
            `;
        });
    }

    function saveUIData(i) {
        if (!document.getElementById(`m-name-${i}`)) return;
        marblesList[i].name = document.getElementById(`m-name-${i}`).value.toUpperCase();
        marblesList[i].color = document.getElementById(`m-color-${i}`).value;
    }

    function addMarbleRow() {
        marblesList.push({ name: `BUMBIŅA ${marblesList.length + 1}`, color: '#7f5539' });
        renderEditorUI();
    }

    function deleteMarbleRow(index) {
        if (marblesList.length <= 1) return;
        marblesList.splice(index, 1); renderEditorUI();
    }

    function buildTrack() {
        lines = []; pins = []; bumpers = [];

        // Tradicionālie koka vadotņu rāmji augšā un lejā
        lines.push({x1: 0, y1: 100, x2: 210, y2: 150}, {x1: 480, y1: 100, x2: 270, y2: 150});
        lines.push({x1: 0, y1: 2360, x2: 210, y2: 2400}, {x1: 480, y1: 2360, x2: 270, y2: 2400});

        if (currentMapIndex === 0) {
            // MAP 1: TRADICIONĀLIE KOKA SLĪPUMI
            for (let y = 250; y < 2200; y += 240) {
                lines.push({ x1: 0, y1: y, x2: 380, y2: y + 120 });
                lines.push({ x1: 480, y1: y + 120, x2: 100, y2: y + 240 });
            }
        } else if (currentMapIndex === 1) {
            // MAP 2: MEHĀNISKIE PINBALL BAMPERI
            for (let y = 280; y < 2200; y += 280) {
                lines.push({ x1: 0, y1: y, x2: 140, y2: y + 40 });
                lines.push({ x1: 480, y1: y, x2: 340, y2: y + 40 });
                
                // Trīsstūrveida bamperi vidū
                bumpers.push({ x: 240, y: y + 100, r: 24 });
                bumpers.push({ x: 130, y: y + 180, r: 18 });
                bumpers.push({ x: 350, y: y + 180, r: 18 });
            }
        } else if (currentMapIndex === 2) {
            // MAP 3: ARCADES PLINKO (Dzelzs nagliņas)
            for (let y = 240; y < 2250; y += 75) {
                let rowIdx = Math.floor(y / 75);
                let count = (rowIdx % 2 === 0) ? 7 : 6;
                let startX = (rowIdx % 2 === 0) ? 40 : 75;
                for (let i = 0; i < count; i++) {
                    pins.push({ x: startX + i * 68, y: y, r: 6 });
                }
            }
        }
    }

    function changeMap(index) {
        currentMapIndex = index;
        document.querySelectorAll('.map-btn').forEach((b, i) => b.classList.toggle('active', i === index));
        startRace();
    }

    function startRaceBtn() {
        if (window.innerWidth <= 900) document.getElementById('sidebar').classList.add('hidden');
        startRace();
    }

    function startRace() {
        raceOver = false; cameraY = 0; finishedMarbles = [];
        buildTrack(); marbles = [];

        marblesList.forEach((data, i) => {
            let startX = 150 + (i * (180 / (marblesList.length - 1 || 1)));
            marbles.push({
                x: startX, y: 30 - (i * 24), vx: (Math.random() - 0.5) * 1.5, vy: 1, r: 11,
                color: data.color, name: data.name, done: false, stuckTimer: 0
            });
        });
        playClickSound(300, "square");
    }

    function getClosestPoint(px, py, x1, y1, x2, y2) {
        let dx = x2 - x1; let dy = y2 - y1;
        let t = ((px - x1) * dx + (py - y1) * dy) / (dx * dx + dy * dy);
        t = Math.max(0, Math.min(1, t));
        return { x: x1 + t * dx, y: y1 + t * dy };
    }

    function update() {
        let leadingY = 0;

        marbles.forEach(m => {
            if (m.done) return;

            // Masīvāka, smagāka fizika
            m.vy += gravity; m.vx *= friction; m.vy *= friction;
            m.x += m.vx; m.y += m.vy;

            // Stingras koka kastes sienas un borti
            if (m.x - m.r < 10) { m.x = m.r + 10; m.vx = Math.abs(m.vx) * bounce; playClickSound(180); }
            if (m.x + m.r > canvas.width - 10) { m.x = canvas.width - m.r - 10; m.vx = -Math.abs(m.vx) * bounce; playClickSound(180); }

            // Slīdēšana pa koka plaknēm
            lines.forEach(line => {
                let closest = getClosestPoint(m.x, m.y, line.x1, line.y1, line.x2, line.y2);
                let dx = m.x - closest.x; let dy = m.y - closest.y;
                let dist = Math.sqrt(dx*dx + dy*dy);

                if (dist < m.r) {
                    let nx = dx / (dist || 1); let ny = dy / (dist || 1);
                    m.x = closest.x + nx * (m.r + 0.1);
                    m.y = closest.y + ny * (m.r + 0.1);

                    let dot = m.vx * nx + m.vy * ny;
                    m.vx = (m.vx - 2 * dot * nx) * 0.3;
                    m.vy = (m.vy - 2 * dot * ny) * 0.3;

                    let lx = line.x2 - line.x1; let ly = line.y2 - line.y1;
                    let lLen = Math.sqrt(lx*lx + ly*ly);
                    if (lLen > 0) {
                        m.vx += (lx / lLen) * 0.4;
                        m.vy += (ly / lLen) * 0.4;
                    }
                }
            });

            // Klasiskās metāla tapiņas (Plinko)
            pins.forEach(p => {
                let dx = m.x - p.x; let dy = m.y - p.y; let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < m.r + p.r) {
                    let nx = dx / dist; let ny = dy / dist;
                    m.x = p.x + nx * (m.r + p.r + 0.1);
                    let dot = m.vx * nx + m.vy * ny;
                    m.vx = (m.vx - 2 * dot * nx) * bounce + (Math.random() - 0.5) * 0.5;
                    m.vy = (m.vy - 2 * dot * ny) * bounce;
                    playClickSound(440);
                }
            });

            // Pinball stila apaļie mehāniskie bamperi (Atsit bumbiņas ar impulsu)
            bumpers.forEach(b => {
                let dx = m.x - b.x; let dy = m.y - b.y; let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < m.r + b.r) {
                    let nx = dx / dist; let ny = dy / dist;
                    m.x = b.x + nx * (m.r + b.r + 0.2);
                    // Piešķir spēcīgāku retro kinētisko grūdienu atpakaļ
                    m.vx = nx * 5.5; m.vy = ny * 5.5;
                    playClickSound(600, "sawtooth");
                }
            });

            // Bumbiņu savstarpējā atgrūšanās
            marbles.forEach(other => {
                if (m === other || other.done) return;
                let dx = other.x - m.x; let dy = other.y - m.y; let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < m.r + other.r) {
                    let overlap = (m.r + other.r) - dist;
                    let nx = dx / (dist || 1); let ny = dy / (dist || 1);
                    m.x -= nx * overlap * 0.5; m.y -= ny * overlap * 0.5;
                    let tx = m.vx; m.vx = other.vx * 0.6; other.vx = tx * 0.6;
                }
            });

            // Mehāniskais Anti-Stuck dzinējs (Pārvieto bumbiņu, ja tā pilnībā apstājas uz līnijas)
            if (Math.abs(m.vx) < 0.15 && Math.abs(m.vy) < 0.2) {
                m.stuckTimer++;
                if (m.stuckTimer > 12) {
                    m.vx += (Math.random() > 0.5 ? 2 : -2);
                    m.vy += 1;
                    m.stuckTimer = 0;
                }
            } else { m.stuckTimer = 0; }

            // Finišs
            if (m.y >= trackHeight - 40) {
                m.done = true; m.vx = 0; m.vy = 0; finishedMarbles.push(m);
                if (finishedMarbles.length === marbles.length) raceOver = true;
            }
            if (m.y > leadingY && !m.done) leadingY = m.y;
        });

        // Plūstoša kameras sekošana
        if (!raceOver && leadingY > canvas.height / 2) {
            let targetY = leadingY - canvas.height / 2;
            cameraY += (targetY - cameraY) * 0.1;
            if (cameraY > trackHeight - canvas.height) cameraY = trackHeight - canvas.height;
        }

        let sorted = [...marbles].sort((a, b) => {
            if (a.done && b.done) return finishedMarbles.indexOf(a) - finishedMarbles.indexOf(b);
            if (a.done) return -1; if (b.done) return 1; return b.y - a.y;
        });
        updateLeaderboardUI(sorted);
    }

    function updateLeaderboardUI(sortedMarbles) {
        const board = document.getElementById('leaderboard'); board.innerHTML = '';
        sortedMarbles.forEach((m, idx) => {
            let txt = m.done ? `FINIŠS (${finishedMarbles.indexOf(m)+1}.)` : `${Math.round(m.y / 20)}m`;
            board.innerHTML += `
                <div class="leader-item" style="border-left: 5px solid ${m.color}; background: #3d2514;">
                    <span>POS ${idx + 1}: ${m.name}</span><span>${txt}</span>
                </div>
            `;
        });
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save(); ctx.translate(0, -cameraY);

        // Koka dēļu faktūras sānu apmales
        ctx.fillStyle = '#3d2514';
        ctx.fillRect(0, 0, 10, trackHeight);
        ctx.fillRect(canvas.width - 10, 0, 10, trackHeight);

        // Klasiskās koka trases vadotnes līnijas
        ctx.strokeStyle = '#4e3524'; ctx.lineWidth = 8; ctx.lineCap = 'round';
        lines.forEach(l => { ctx.beginPath(); ctx.moveTo(l.x1, l.y1); ctx.lineTo(l.x2, l.y2); ctx.stroke(); });

        // Metāla nagliņas (Pins) ar spīduma efektu
        pins.forEach(p => {
            ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fillStyle = '#6c757d'; ctx.fill();
            ctx.beginPath(); ctx.arc(p.x - 2, p.y - 2, 2, 0, Math.PI*2); ctx.fillStyle = '#ffffff'; ctx.fill();
        });

        // Pinball stila apaļie bamperi
        bumpers.forEach(b => {
            ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fillStyle = '#9a031e'; ctx.strokeStyle = '#e3d5ca'; ctx.lineWidth = 3; ctx.fill(); ctx.stroke();
            ctx.beginPath(); ctx.arc(b.x, b.y, b.r - 6, 0, Math.PI*2); ctx.fillStyle = '#e3d5ca'; ctx.fill();
        });

        // Klasiskais retro šaha galds finiša zonā (Rūtiņas)
        let finishY = trackHeight - 40;
        let boxSize = 20;
        for (let x = 0; x < canvas.width; x += boxSize) {
            for (let y = finishY; y < trackHeight; y += boxSize) {
                ctx.fillStyle = ((x / boxSize + y / boxSize) % 2 === 0) ? '#ffffff' : '#000000';
                ctx.fillRect(x, y, boxSize, boxSize);
            }
        }

        // Bumbiņas ar klasisku 3D sfēras ēnojumu (Glancētas)
        marbles.forEach(m => {
            ctx.save(); ctx.beginPath(); ctx.arc(m.x, m.y, m.r, 0, Math.PI * 2); ctx.clip();
            let gradient = ctx.createRadialGradient(m.x - m.r*0.3, m.y - m.r*0.3, 1, m.x, m.y, m.r);
            gradient.addColorStop(0, '#ffffff'); gradient.addColorStop(0.2, m.color); gradient.addColorStop(1, '#000000');
            ctx.fillStyle = gradient; ctx.fill();
            ctx.strokeStyle = '#000000'; ctx.lineWidth = 1.5; ctx.stroke(); ctx.restore();
        });

        ctx.restore();

        // Rezultātu paziņojums retro stilā
        if (raceOver) {
            ctx.fillStyle = 'rgba(26, 18, 11, 0.96)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#eddfd3'; ctx.font = 'bold 22px monospace'; ctx.textAlign = 'center';
            ctx.fillText("GALĪGIE REZULTĀTI", canvas.width / 2, 160);
            finishedMarbles.forEach((m, idx) => {
                if (idx > 4) return; ctx.font = '16px monospace'; ctx.fillStyle = m.color;
                ctx.fillText(`[${idx + 1}] VIETA: ${m.name}`, canvas.width / 2, 230 + idx * 42);
            });
        }
    }

    function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }

    renderEditorUI(); startRace(); gameLoop();
</script>

</body>
</html>
