<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega Marble Duel Arēna</title>
    <style>
        body {
            margin: 0;
            background: radial-gradient(circle, #1a1a2e 0%, #0f0f1a 100%);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        h1 {
            margin: 5px 0;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
            font-size: 24px;
        }
        #ui {
            display: flex;
            gap: 40px;
            margin-bottom: 15px;
            font-size: 18px;
            font-weight: bold;
        }
        .hp-bar { display: flex; align-items: center; gap: 5px; }
        .heart { color: #ff4757; font-size: 20px; text-shadow: 0 0 5px #ff4757; }
        .heart.empty { color: #444; text-shadow: none; }
        canvas {
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.6), 0 0 20px rgba(30, 144, 255, 0.2);
            border-radius: 50%;
            background-color: #05050a;
        }
        button {
            padding: 10px 25px;
            font-size: 16px;
            font-weight: bold;
            background: linear-gradient(45deg, #1e90ff, #ff4757);
            color: white;
            border: none;
            border-radius: 20px;
            margin-bottom: 15px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            transition: transform 0.2s;
        }
        button:hover { transform: scale(1.05); }
    </style>
</head>
<body>

    <h1>Bumbiņu Duelis: Arēna</h1>
    <button onclick="resetGame()">Restartēt Dueli</button>
    
    <div id="ui">
        <div class="hp-bar">Zilais: <span id="blue-hp"></span></div>
        <div class="hp-bar">Sarkanais: <span id="red-hp"></span></div>
    </div>

    <canvas id="arenaCanvas" width="600" height="600"></canvas>

    <script>
        const canvas = document.getElementById('arenaCanvas');
        const ctx = canvas.getContext('2d');

        const arenaRadius = 280;
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const gravity = 0.12;
        const bounce = 0.75;

        let marbles = [];
        let particles = [];
        let rotationAngle = 0;
        let gameOver = false;
        let winnerText = "";

        class Marble {
            constructor(x, y, vx, vy, radius, color, name, hpId) {
                this.x = x; this.y = y; this.vx = vx; this.vy = vy;
                this.radius = radius; this.color = color; this.name = name;
                this.hpId = hpId; this.maxHp = 3; this.hp = 3;
                this.history = [];
            }
            update() {
                this.vy += gravity;
                this.x += this.vx;
                this.y += this.vy;

                // Saglabā astes efektu
                this.history.push({x: this.x, y: this.y});
                if (this.history.length > 8) this.history.shift();

                // Sadursme ar apļveida arēnas sienu
                let dx = this.x - centerX;
                let dy = this.y - centerY;
                let dist = Math.sqrt(dx * dx + dy * dy);

                if (dist + this.radius > arenaRadius) {
                    let nx = dx / dist;
                    let ny = dy / dist;
                    this.x = centerX + nx * (arenaRadius - this.radius);
                    let dot = this.vx * nx + this.vy * ny;
                    this.vx = (this.vx - 2 * dot * nx) * bounce;
                    this.vy = (this.vy - 2 * dot * ny) * bounce;
                    
                    // Berze gar sienu un mazs randomness
                    this.vx += (Math.random() - 0.5) * 0.2;
                }
            }
        }

        function spawnParticles(x, y, color) {
            for(let i=0; i<12; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 6,
                    radius: Math.random() * 4 + 2,
                    alpha: 1,
                    color: color
                });
            }
        }

        function resetGame() {
            gameOver = false;
            winnerText = "";
            particles = [];
            marbles = [
                new Marble(centerX - 80, centerY - 100, 2, 0, 16, '#1e90ff', 'Zilais', 'blue-hp'),
                new Marble(centerX + 80, centerY - 100, -2, 0, 16, '#ff4757', 'Sarkanais', 'red-hp')
            ];
            updateUI();
        }

        function updateUI() {
            ['blue-hp', 'red-hp'].forEach(id => {
                const marble = marbles.find(m => m.hpId === id);
                const el = document.getElementById(id);
                if (!el) return;
                let hearts = "";
                let hpCount = marble ? marble.hp : 0;
                for(let i=0; i<3; i++) {
                    hearts += i < hpCount ? '<span class="heart">❤</span>' : '<span class="heart empty">❤</span>';
                }
                el.innerHTML = hearts;
            });
        }

        function handleDuelCollisions() {
            if (marbles.length < 2) return;
            let m1 = marbles[0];
            let m2 = marbles[1];

            let dx = m2.x - m1.x;
            let dy = m2.y - m1.y;
            let dist = Math.sqrt(dx * dx + dy * dy);

            if (dist < m1.radius + m2.radius) {
                let nx = dx / dist; let ny = dy / dist;
                let kx = m1.vx - m2.vx; let ky = m1.vy - m2.vy;
                let p = 2 * (kx * nx + ky * ny) / 2;

                m1.vx -= p * nx; m1.vy -= p * ny;
                m2.vx += p * nx; m2.vy += p * ny;

                // Aprēķina trieciena spēku
                let tSpēks = Math.sqrt(kx*kx + ky*ky);
                if (tSpēks > 3.5) { // Tikai spēcīgi triecieni atņem dzīvību
                    let midX = (m1.x + m2.x) / 2;
                    let midY = (m1.y + m2.y) / 2;
                    
                    if (Math.random() > 0.5) {
                        m1.hp--; spawnParticles(midX, midY, m1.color);
                    } else {
                        m2.hp--; spawnParticles(midX, midY, m2.color);
                    }
                    updateUI();
                    checkGameOver();
                }
            }
        }

        function checkGameOver() {
            if (marbles[0].hp <= 0) { gameOver = true; winnerText = "Sarkanais Uzvarēja!"; }
            else if (marbles[1].hp <= 0) { gameOver = true; winnerText = "Zilais Uzvarēja!"; }
        }

        function handleObstacleCollision(m, rx, ry, size, angle) {
            // Vienkāršota rotējoša šķēršļa līniju sadursme
            let cx = centerX + rx;
            let cy = centerY + ry;
            let dx = m.x - cx;
            let dy = m.y - cy;
            let dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < size && dist > 10) {
                m.vx = (Math.random() - 0.5) * 5 + Math.sin(angle)*3;
                m.vy = -Math.abs(m.vy) * bounce - 1;
            }
        }

        function update() {
            if (gameOver) return;

            rotationAngle += 0.01;

            marbles.forEach(m => {
                m.update();
                // Sadursmes ar rotējošiem šķēršļiem centrā
                handleObstacleCollision(m, 0, 0, 50, rotationAngle);
                handleObstacleCollision(m, Math.cos(rotationAngle)*100, Math.sin(rotationAngle)*100, 25, -rotationAngle);
            });

            handleDuelCollisions();

            // Daļiņu (particles) kustība
            for(let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy; p.alpha -= 0.02;
                if (p.alpha <= 0) particles.splice(i, 1);
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Zīmē arēnas fonu un režģi
            ctx.beginPath();
            ctx.arc(centerX, centerY, arenaRadius, 0, Math.PI * 2);
            ctx.fillStyle = '#0a0a16';
            ctx.fill();
            ctx.strokeStyle = '#1e90ff';
            ctx.lineWidth = 4;
            ctx.shadowBlur = 15; ctx.shadowColor = '#1e90ff';
            ctx.stroke();
            ctx.shadowBlur = 0; // Noņem spīdumu citiem elementiem

            // Zīmē rotējošos šķēršļus arēnas vidū
            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate(rotationAngle);
            ctx.fillStyle = '#ff9f43';
            ctx.fillRect(-40, -6, 80, 12);
            ctx.fillRect(-6, -40, 12, 80);
            ctx.restore();

            // Zīmē bumbiņu astes un pašas bumbiņas
            marbles.forEach(m => {
                // Aste
                m.history.forEach((pos, idx) => {
                    ctx.beginPath();
                    ctx.arc(pos.x, pos.y, m.radius * (idx / m.history.length), 0, Math.PI * 2);
                    ctx.fillStyle = m.color + "22"; // Caurspīdīga aste
                    ctx.fill();
                });

                // Bumbiņa
                ctx.beginPath();
                ctx.arc(m.x, m.y, m.radius, 0, Math.PI * 2);
                ctx.fillStyle = m.color;
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 3;
                ctx.stroke();
                
                // Acis vai sejiņa (kā video)
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(m.x - 4, m.y - 3, 3, 0, Math.PI*2);
                ctx.arc(m.x + 4, m.y - 3, 3, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(m.x - 4, m.y - 3, 1, 0, Math.PI*2);
                ctx.arc(m.x + 4, m.y - 3, 1, 0, Math.PI*2);
                ctx.fill();
            });

            // Zīmē daļiņas (hit efektus)
            particles.forEach(p => {
                ctx.save();
                ctx.globalAlpha = p.alpha;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.fill();
                ctx.restore();
            });

            // Spēles beigu ekrāns
            if (gameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
                ctx.beginPath();
                ctx.arc(centerX, centerY, arenaRadius, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#fff';
                ctx.font = 'bold 32px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(winnerText, centerX, centerY);
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        resetGame();
        gameLoop();
    </script>
</body>
</html>
